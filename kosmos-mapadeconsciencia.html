<style>
:root{
  --bg:#020407;--s1:#080e1c;--s2:#0c1428;--s3:#101b34;
  --border:rgba(120,140,200,0.08);--b2:rgba(120,140,200,0.15);--b3:rgba(120,140,200,0.28);
  --text:#d8dff0;--muted:#4a5878;--muted2:#7888b0;
  --indigo:#6272f0;--violet:#a855f7;--uv:#d946ef;--luz:#f0c060;
  --grad:linear-gradient(135deg,#6272f0 0%,#a855f7 35%,#d946ef 65%,#f0c060 100%);
  --grad2:linear-gradient(90deg,#6272f0,#a855f7,#d946ef,#f0c060);
  --ok:#34d399;--warn:#fbbf24;--alert:#fb7185;
  --ff-d:'Cormorant Garamond',Georgia,serif;--ff-b:'Outfit',system-ui,sans-serif;--ff-m:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--ff-b);font-weight:300;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.65;
  background-image:radial-gradient(900px 500px at 80% -10%,rgba(98,114,240,.10),transparent 60%),radial-gradient(700px 500px at 0% 110%,rgba(217,70,239,.07),transparent 60%);}
.wrap{max-width:1080px;margin:0 auto;padding:28px 18px 90px}
.fade{animation:fade .45s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.serif{font-family:var(--ff-d)}.mono{font-family:var(--ff-m)}
.eyebrow{font-family:var(--ff-m);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted2)}
h1{font-family:var(--ff-d);font-weight:500;font-size:clamp(32px,6vw,56px);line-height:1.05;letter-spacing:-.01em}
h2{font-family:var(--ff-d);font-weight:500;font-size:clamp(23px,4vw,33px);line-height:1.12}
h3{font-family:var(--ff-d);font-weight:500;font-size:21px;line-height:1.22}
h4{font-family:var(--ff-d);font-weight:500;font-size:17px;line-height:1.25}
.lead{color:var(--muted2);font-size:15px;max-width:660px}
p.body{font-size:14px;color:var(--muted2);margin-top:8px}
.card{background:linear-gradient(180deg,rgba(16,27,52,.55),rgba(8,14,28,.55));border:1px solid var(--border);border-radius:18px;padding:22px;backdrop-filter:blur(8px)}
.card.glow{border-color:var(--b2);box-shadow:0 30px 80px -40px rgba(98,114,240,.4)}
.sub{background:rgba(8,14,28,.45);border:1px solid var(--border);border-radius:13px;padding:14px 16px}
.divider{height:1px;background:var(--border);margin:18px 0}
.btn{font-family:var(--ff-b);font-weight:500;font-size:14px;padding:15px 26px;border-radius:12px;border:none;cursor:pointer;color:#06080f;background:var(--grad2);transition:transform .15s,filter .15s}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;filter:none}
.tag{display:inline-block;font-family:var(--ff-m);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:4px 11px;border-radius:99px;border:1px solid var(--b2);color:var(--muted2)}
.field{width:100%;background:rgba(8,14,28,.6);border:1px solid var(--b2);border-radius:12px;padding:14px 16px;color:var(--text);font-family:var(--ff-b);font-size:15px;font-weight:300;margin-bottom:12px}
.field:focus{outline:none;border-color:var(--indigo)}
.field::placeholder{color:var(--muted)}
.ferr{color:#fb7185;font-size:12px;margin:-4px 0 10px;font-family:var(--ff-m);display:none}
.prog{height:3px;background:rgba(120,140,200,.12);border-radius:2px;overflow:hidden;margin:16px 0 26px}
.prog>i{display:block;height:100%;background:var(--grad2);transition:width .4s}
.opt{width:100%;text-align:left;background:rgba(8,14,28,.5);border:1px solid var(--border);border-radius:13px;padding:14px 17px;color:var(--text);font-size:14px;cursor:pointer;margin-bottom:9px;transition:all .14s;display:flex;gap:13px;align-items:flex-start;font-weight:300}
.opt:hover{border-color:var(--b3);background:rgba(120,140,200,.06)}
.opt.sel{border-color:var(--indigo);background:rgba(98,114,240,.10)}
.dot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--muted);flex-shrink:0;margin-top:2px}
.opt.sel .dot{border-color:var(--indigo);border-width:5px}
.likert{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap}
.lk{flex:1;min-width:62px;text-align:center;background:rgba(8,14,28,.5);border:1px solid var(--border);border-radius:11px;padding:10px 5px;cursor:pointer;font-size:10.5px;color:var(--muted2);transition:all .14s;line-height:1.3}
.lk:hover{border-color:var(--b3)}
.lk.sel{border-color:var(--indigo);background:rgba(98,114,240,.12);color:var(--text)}
.lk b{display:block;font-family:var(--ff-m);font-size:14px;color:var(--text);margin-bottom:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.scale-row{margin-bottom:16px}
.scale-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:5px}
.scale-top .vl{font-family:var(--ff-m);font-size:11px;color:var(--muted2)}
.scale-tr{height:7px;border-radius:4px;background:rgba(120,140,200,.10);overflow:hidden;position:relative}
.scale-fl{height:100%;border-radius:4px;transition:width .9s cubic-bezier(.2,.8,.2,1)}
.scale-mk{position:absolute;top:-3px;width:1px;height:13px;background:rgba(216,223,240,.25)}
.scale-txt{font-size:12.5px;color:var(--muted2);margin-top:6px;line-height:1.6}
.badge{font-family:var(--ff-m);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:99px;font-weight:500}
.kv{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.kv:last-child{border:none}.kv .k{color:var(--muted2)}
.theo{display:inline-block;font-family:var(--ff-m);font-size:9.5px;padding:2px 8px;border-radius:99px;background:rgba(120,140,200,.07);color:var(--muted2);margin:2px 3px 2px 0}
.matrix{display:grid;gap:4px;margin-top:8px}
.mx-cell{border-radius:7px;padding:7px 4px;text-align:center;font-size:9px;border:1px solid var(--border);color:var(--muted);transition:all .2s}
.mx-cell.you{border-color:var(--luz);color:var(--text);box-shadow:0 0 22px -6px var(--luz)}
.mx-head{font-family:var(--ff-m);font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);text-align:center;padding-bottom:3px}
.flag{border-left:2px solid;padding:12px 15px;border-radius:0 10px 10px 0;margin-bottom:10px;font-size:13.5px;background:rgba(120,140,200,.04);line-height:1.65}
.nav{position:sticky;top:0;z-index:30;backdrop-filter:blur(14px);background:rgba(2,4,7,.72);border-bottom:1px solid var(--border);margin:-28px -18px 22px;padding:13px 18px;display:flex;align-items:center;justify-content:space-between}
.nav .lg{font-family:var(--ff-d);font-size:20px;letter-spacing:.02em}.nav .lg b{font-weight:600}
.tabs{display:flex;gap:6px}
.tab{font-family:var(--ff-m);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;padding:7px 13px;border-radius:99px;border:1px solid var(--border);color:var(--muted2);cursor:pointer}
.tab.on{border-color:var(--b3);color:var(--text);background:rgba(120,140,200,.07)}
.sec-h{display:flex;align-items:center;gap:11px;margin:30px 0 12px}
.sec-h .n{font-family:var(--ff-m);font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:3px 8px;flex-shrink:0}
.practice{background:rgba(8,14,28,.5);border:1px solid var(--border);border-radius:13px;padding:14px 16px;margin-bottom:9px;cursor:pointer;transition:all .14s;display:flex;gap:13px;align-items:flex-start}
.practice:hover{border-color:var(--b3)}
.practice.sel{border-color:var(--indigo);background:rgba(98,114,240,.08)}
.chk{width:21px;height:21px;border-radius:7px;border:1.5px solid var(--muted);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px}
.practice.sel .chk{background:var(--indigo);border-color:var(--indigo);color:#06080f}
.mod-lbl{font-family:var(--ff-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin:20px 0 4px}
.week-grid{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.wk{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;color:var(--muted2)}
.wk.done{color:#06080f;border-color:transparent}
.streak{font-family:var(--ff-m);font-size:11px;color:var(--luz)}
.snap-btn{font-family:var(--ff-m);font-size:11px;color:var(--indigo);cursor:pointer;border:1px dashed var(--b2);border-radius:9px;padding:8px 12px;background:transparent}
.note{font-size:11.5px;color:var(--muted);font-family:var(--ff-m);line-height:1.7}
.viz2{display:flex;gap:22px;align-items:center;justify-content:center;flex-wrap:wrap}
@media print{.no-print{display:none!important}body{background:#020407!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.card{break-inside:avoid}@page{margin:10mm}}
@media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr}.tabs{display:none}.viz2{flex-direction:column}}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
const MAKE_WEBHOOK_URL="https://hook.us2.make.com/di8nys4yzx72wt7waoepja5ff34gesev";
const C=['#fb923c','#4ade80','#2dd4bf','#22d3ee','#6272f0','#a855f7','#d946ef'];

/* ════════ EIXO 1 · ESTÁGIOS ════════ */
const STAGES=[
{name:'Realizador–Racional',alt:'Laranja',camada:'1ª camada',pessoa:'3ª pessoa · mundicêntrica',
 teoricos:['Graves: Laranja','Cook-Greuter: Consciencioso','Loevinger: E4','Kohlberg: pós-convencional inicial'],
 lead:'Você cria futuro pela força da realização: lógica, mérito, inovação e resultados concretos que movem o mundo adiante. Enxerga o mundo como um sistema a ser otimizado — e tem a capacidade rara de transformar visão em execução.',
 cognicao:'Pensamento lógico-formal e hipotético-dedutivo. Você testa, mede e ajusta. A verdade é aquilo que funciona e se comprova.',
 emocao:'A emoção tende a ser tratada como variável a administrar, não como fonte de informação. Isso dá foco — e custa profundidade relacional.',
 acao:'Lógica de ação orientada a metas e eficácia. Decide por custo, retorno e viabilidade, com horizonte de tempo linear.',
 etica:'Princípios universais racionais: justiça, mérito, contrato. A pergunta orientadora é "isto é correto e eficaz?".',
 trabalho:'Trabalha para realizar potencial e conquistar posição de impacto. Sucesso é medido por resultado visível.',
 luz:'Autonomia de pensamento, capacidade de manifestação, disciplina estratégica e coragem de empreender no mundo real.',
 sombra:'Reduzir valor a desempenho e tratar pessoas e planeta como recursos. Vazio existencial após atingir as metas — o "consegui tudo, e agora?".',
 pretrans:'Confundir competência técnica e sucesso material com maturidade de consciência. Realizar mais não é evoluir verticalmente: é ganho horizontal.',
 proximo:'O próximo salto é descentrar-se do próprio desempenho e deixar que a diversidade de perspectivas e o sofrimento do mundo o afetem de verdade.',
 futuros:'inovação de impacto, empreendedorismo de propósito e ciência aplicada ao bem comum.'},

{name:'Pluralista–Sensível',alt:'Verde',camada:'1ª camada',pessoa:'4ª pessoa · relacional-contextual',
 teoricos:['Graves: Verde','Cook-Greuter: Individualista (E5)','Loevinger: Individualista','Wade: Afiliativa'],
 lead:'Você cria futuro ampliando quem participa: dá voz a quem foi deixado de fora, cuida do planeta e dos vulneráveis do mundo, e constrói consenso onde havia imposição.',
 cognicao:'Pensamento contextual e relativista. Você percebe que toda verdade é situada — o que abre empatia, mas dificulta hierarquizar valores.',
 emocao:'Alta sensibilidade afetiva. A emoção do coletivo é percebida diretamente; o risco é absorvê-la sem discernimento nem proteção.',
 acao:'Decide por consenso, escuta e cuidado com o processo. Resiste a estruturas de autoridade mesmo quando elas serviriam ao coletivo.',
 etica:'Ética do cuidado e da inclusão radical. A pergunta é "quem está sendo excluído por esta decisão?".',
 trabalho:'Busca coerência entre valores e trabalho. Prefere estruturas horizontais e propósito explícito.',
 luz:'Empatia genuína, consciência ecológica, capacidade de sustentar a multiplicidade e de reparar injustiças históricas.',
 sombra:'Paralisia relativista: dificuldade de decidir, de hierarquizar valores e de exercer autoridade quando o mundo precisa de direção. Julgamento moral disfarçado de abertura.',
 pretrans:'Confundir a ausência de hierarquia (pré-convencional) com a inclusão de hierarquias (pós-convencional). O igualitarismo radical pode mascarar a recusa em se desenvolver e em liderar.',
 proximo:'O próximo salto é reconhecer que existem hierarquias de crescimento — não de dominação — e recuperar a capacidade de decidir e liderar sem perder a sensibilidade.',
 futuros:'movimentos de justiça, diálogo social, economias colaborativas e ativismo ecológico.'},

{name:'Estratégico–Integral',alt:'Teal / Amarelo',camada:'2ª camada',pessoa:'5ª pessoa · sistêmica',
 teoricos:['Torbert: Estrategista','Cook-Greuter: Autônomo (E7)','Graves: Amarelo','Wilber: Integral'],
 lead:'Você cria futuro desenhando arquiteturas civilizacionais: integra perspectivas contraditórias e equilibra polaridades em escala societal e planetária. Não escolhe lados — projeta o sistema que os contém.',
 cognicao:'Visão-lógica: pensa em fluxos, padrões e sistemas dinâmicos. Reconhece que cada estágio anterior carrega uma verdade parcial necessária ao todo.',
 emocao:'Equanimidade crescente. Sustenta tensão sem colapsar — mas pode intelectualizar a emoção em vez de habitá-la.',
 acao:'Lógica do Estrategista: age a partir de princípios próprios examinados, com horizonte de décadas, aceitando o paradoxo como dado e não como problema.',
 etica:'Ética sistêmica de longo prazo. A pergunta é "que intervenção serve à evolução do sistema inteiro, e não só à parte que me cabe?".',
 trabalho:'Constrói organizações como organismos vivos e trata cada projeto como laboratório de consciência coletiva.',
 luz:'Pensamento sistêmico, navegação de paradoxos, capacidade de traduzir entre visões de mundo, liderança que integra sem achatar diferenças.',
 sombra:'Mapa sem território: modelos cada vez mais sofisticados que não viram ação no mundo. O estrategista isolado, cuja profundidade poucos acompanham — e a solidão que vem disso.',
 pretrans:'Sofisticação cognitiva (ganho horizontal) simulando estágio (ganho vertical). Falar fluentemente o mapa integral não é encarná-lo — é a armadilha mais comum desta altitude.',
 proximo:'O próximo salto não é pensar melhor: é encarnar o que já se compreende. Descer o conhecimento para o corpo, a sombra e a relação.',
 futuros:'organizações regenerativas, políticas públicas integrais e ecossistemas de inovação social.'},

{name:'Holístico–Alquímico',alt:'Turquesa',camada:'2ª camada',pessoa:'6ª pessoa · holística-planetária',
 teoricos:['Torbert: Alquimista','Graves: Turquesa','Cook-Greuter: início Construct-aware','Wilber: Holístico'],
 lead:'Você cria futuro por ressonância de campo: sua presença reorganiza sistemas antes mesmo da fala. Trata o planeta como um organismo vivo do qual é parte, e trabalha com o todo, não só com as partes.',
 cognicao:'Percepção holística e não-linear. Paradoxos são integrados sem tensão; padrões de totalidade aparecem antes da análise.',
 emocao:'Equanimidade ativa: profundamente comovido pelo sofrimento do mundo sem ser consumido por ele — dói mais, incomoda menos.',
 acao:'Lógica do Alquimista: transforma sistemas ao se transformar. Cada ação é simultaneamente reflexão e intervenção.',
 etica:'A bússola já não é apenas o princípio, mas a necessidade evolutiva: "isto serve à evolução consciente no horizonte de gerações?".',
 trabalho:'O campo de coerência do grupo é um indicador tão real quanto as métricas financeiras. Opera em horizontes longos agindo no presente.',
 luz:'Permeabilidade com o todo, compaixão que não se consome, capacidade de sustentar campos coletivos de alta complexidade.',
 sombra:'Bypass espiritual: usar a perspectiva holística para evitar conflito direto, responsabilidade prática e encarnação. Superioridade espiritual disfarçada de serenidade.',
 pretrans:'Transcender sem incluir a sombra é regressão disfarçada de elevação. É aqui que a falácia pré-trans se torna mais sedutora — porque a experiência é real.',
 proximo:'O próximo salto é sutil e profundo: incluir a sombra em vez de transcendê-la, e permitir que a identidade se desloque do pensamento para a presença sentida.',
 futuros:'design bioregional, governança regenerativa e redes globais de regeneração de campo.'},

{name:'Mente Iluminada',alt:'Índigo',camada:'3ª camada',pessoa:'7ª pessoa · kosmocêntrica',
 teoricos:['Cook-Greuter: Construct-aware (E8)','Torbert: Ironista','Aurobindo: Mente Iluminada','Wilber: Mente Global'],
 lead:'Você cria futuro como veículo de um impulso evolutivo encarnado agora — não por agenda pessoal, mas a serviço do mundo que quer nascer. A autoridade vem da presença, não do cargo.',
 cognicao:'Percebe, em tempo real, a própria mente construindo a realidade. Todos os mapas — inclusive o integral — são vistos como instrumentos, não verdades.',
 emocao:'Amor, gratidão e paz como estados sustentados e não reativos. A emoção é lida como informação de campo, não apenas experiência pessoal.',
 acao:'Lógica do Ironista: habita a contradição criativa sem precisar resolvê-la. Age com comprometimento total e leveza simultânea.',
 etica:'Consciência kosmocêntrica como bússola: a responsabilidade pela direção da evolução é sentida como pessoal e inescapável.',
 trabalho:'Cada projeto carrega dupla entrega: uma jornada interior e uma capacidade sistêmica destravada no mundo.',
 luz:'A Testemunha como identidade estável, não como experiência. Presença que reorganiza campos. Lucidez sobre a construção da realidade, sem cinismo.',
 sombra:'Dificuldade de traduzir altitude em linguagem comum. Estranheza crescente com o mundo convencional, como se operasse em outro registro de realidade.',
 pretrans:'A lucidez sem encarnação vira niilismo ("nada é real, então nada importa") ou inflação ("eu transcendi tudo"). São a mesma armadilha vista de ângulos opostos.',
 proximo:'O próximo salto é estabilizar o estado causal e traduzir a percepção em linguagem, decisão e estrutura que o mundo consiga receber.',
 futuros:'governança kosmocêntrica, laboratórios de futuros emergentes e assembleias planetárias de visão.'},

{name:'Mente Intuitiva',alt:'Violeta',camada:'3ª camada',pessoa:'8ª pessoa · kosmocêntrica',
 teoricos:['Cook-Greuter: Unitivo (E9)','Aurobindo: Mente Intuitiva','Torbert: além do Ironista','Wilber: Meta-Mente'],
 lead:'Você cria futuro por superabundância: as decisões emergem do silêncio sem cálculo, e a ação para o mundo nasce do transbordo, não da falta. O esforço deixa de drenar e passa a expressar.',
 cognicao:'Conhecimento como reconhecimento, não como aprendizado. Visão reveladora rápida, sem intermediação discursiva.',
 emocao:'Plenitude estável. A compaixão é vasta e impessoal — o que traz alívio e, ao mesmo tempo, uma solidão específica desta altitude.',
 acao:'A ação emerge do vazio, não da necessidade de provar. Agência sem ego de agente.',
 etica:'A responsabilidade já não é sentida como fardo, mas como privilégio estrutural: servir à evolução é a única coisa que faz sentido.',
 trabalho:'Estrutura e recursos fluem como consequência da coerência, não como objetivo. O trabalho é vocação no sentido literal.',
 luz:'Insight sem esforço cognitivo; ação que dá sem esgotar e serve sem drenar. Eros vivo a serviço da evolução.',
 sombra:'Solidão existencial profunda que nenhuma companhia resolve. O essencial torna-se inexprimível — e os limites da linguagem passam a doer.',
 pretrans:'Estado unitivo de pico confundido com estrutura unitiva permanente. A distinção estado↔traço é o antídoto: um vislumbre não é uma altitude.',

 async get(k){try{if(window.storage){const r=await window.storage.get(k);return r?JSON.parse(r.value):null;}}catch(e){}

/* ════════ SCORING ════════ */
function lineScore(id){const a=S.lineAns[id]||[0,0,0];return Math.min(100,Math.round((a[0]*0.33+a[1]*0.66+a[2]*1.0)/7.96*100));}
function lineStage(sc){return sc<18?0:sc<38?1:sc<60?2:sc<78?3:sc<90?4:sc<97?5:6;}
function band(sc){return sc<40?'b':sc<72?'m':'a';}
function stateScore(id){const a=S.stateAns[id]||[0,0];return{access:Math.round(a[0]/4*100),plateau:a[1]>=a[0]&&a[0]>=3};}
function compute(){
 const lines={};LINES.forEach(l=>{const sc=lineScore(l.id);lines[l.id]={score:sc,stage:lineStage(sc),band:band(sc)};});
 const states={};STATES.forEach(s=>states[s.id]=stateScore(s.id));
 const votes=new Array(7).fill(0);
 S.stageAns.forEach((o,i)=>{if(o!=null)votes[STAGE_Q[i].opts[o].s]+=2;});
 ['cog','self','val'].forEach(id=>votes[lines[id].stage]+=1);
 const total=votes.reduce((a,b)=>a+b,0)||1;
 let g=0;votes.forEach((v,i)=>g+=v*i);g=g/total;
 const primary=Math.max(0,Math.min(6,Math.round(g)));
 const emergent=Math.min(6,primary+1),anterior=Math.max(0,primary-1);
 const overall=Math.round(LINES.reduce((a,l)=>a+lines[l.id].score,0)/LINES.length);
 const highStates=(states.sutil.access+states.causal.access+states.nd.access)/3;
 const others=(lines.self.score+lines.val.score+lines.mor.score+lines.rel.score+lines.som.score)/5;
 const flags=[];
 if(highStates>55&&primary<4)flags.push({t:'Estados acima do estágio',c:'var(--warn)',
  d:'Você acessa estados elevados — sutil, causal ou não-dual — que ainda são interpretados por uma estrutura mais convencional. Esta é a assinatura clássica da falácia pré-trans: a experiência é real, mas a moldura que a lê ainda não é transpessoal. O risco prático é literalizar o vislumbre, transformando-o em identidade, missão especial ou certeza inquestionável. O trabalho aqui não é meditar mais: é amadurecer a estrutura que interpreta a experiência.'});
 if(lines.cog.score-others>22)flags.push({t:'Familiaridade vs. descrição',c:'var(--alert)',
  d:'Sua linha cognitiva está bem acima das demais — sinal de que você domina o vocabulário da terceira camada mais do que o encarna. É a armadilha central do líder integral: memorizar o mapa pode impedir a transformação, porque convence o ego de que ele já chegou. A saída é descer o conhecimento para onde ele não pode ser fingido: o corpo, a sombra e a relação. Escolha práticas desses três módulos antes de acrescentar qualquer novo conceito.'});
 if(lines.som.score<others-18)flags.push({t:'Topo pesado, base leve',c:'var(--warn)',
  d:'Sua linha somática está atrás das demais. Altitude sem encarnação é instável: estados elevados sem base corporal oscilam sob pressão e tendem à desencarnação. Esta é a linha prioritária — não a mais forte. A terceira camada não flutua: ela enraíza mais fundo do que qualquer estágio anterior.'});
 if(highStates>60&&states.denso.access<55)flags.push({t:'Subir sem ancorar',c:'var(--warn)',
  d:'Forte acesso a estados expandidos com presença encarnada mais baixa. A realização só se torna útil ao mundo quando desce à matéria: o movimento completo não é apenas ascender, é trazer de volta. Ancorar não é um passo anterior ao caminho — é parte dele.'});
 if(lines.rel.score<others-15)flags.push({t:'Altitude sem relação',c:'var(--warn)',
  d:'Sua linha interpessoal está atrás do conjunto. É o padrão mais comum entre pessoas cognitivamente avançadas — e o que mais limita a liderança no mundo real, porque nenhuma visão sistêmica se realiza sem a capacidade de estar com quem discorda. Priorize o módulo Relacional.'});
 if(lines.esp.score>lines.mor.score+22)flags.push({t:'Despertar sem crescer',c:'var(--warn)',
  d:'Seu acesso espiritual (Waking Up) está bem acima da sua maturação moral (Growing Up). São eixos independentes: é possível ter experiências profundas de unidade e ainda operar eticamente num círculo estreito. Historicamente, é essa combinação que produz os escândalos de mestres espirituais. O contrapeso é ética aplicada e sombra — não mais meditação.'});
 const higher=votes.slice(4).reduce((a,b)=>a+b,0);
 const threshold=Math.round(higher/total*100);
 const arr=LINES.map(l=>({id:l.id,name:l.name,score:lines[l.id].score})).sort((a,b)=>b.score-a.score);
 return{lines,states,primary,emergent,anterior,overall,flags,threshold,leader:arr[0],lagger:arr[arr.length-1],highStates:Math.round(highStates)};
}
function nextState(){const order=['denso','sutil','causal','test','nd'],r=S.result;
 for(let i=0;i<order.length;i++){const id=order[i];if(!r.states[id].plateau&&r.states[id].access>15)return STATES.filter(s=>s.id===id)[0];}
 return STATES[4];}
function lineById(id){return LINES.filter(l=>l.id===id)[0];}

/* ════════ ASSESSMENT ════════ */
function assessTotal(){return LINES.length*3+STATES.length*2+STAGE_Q.length;}
function assessDone(){let n=0;
 LINES.forEach(l=>{(S.lineAns[l.id]||[]).forEach(v=>{if(v!=null)n++;});});
 STATES.forEach(s=>{(S.stateAns[s.id]||[]).forEach(v=>{if(v!=null)n++;});});
 S.stageAns.forEach(a=>{if(a!=null)n++;});return n;}
function renderAssess(){
 const total=assessTotal(),pct=assessDone()/total*100;let html='';
 if(S.step===0){const l=LINES[S.qi],a=S.lineAns[l.id]||[null,null,null];
  html='<div class="tag" style="margin-bottom:14px">Eixo 3 · Linhas de desenvolvimento</div><h2>'+l.name+'</h2><div class="note" style="margin:4px 0 8px">'+l.teo+'</div><p class="body" style="margin-bottom:16px">'+l.sobre+'</p>'+
   l.items.map(function(it,j){return '<div class="card" style="margin-bottom:12px;padding:16px 18px"><div style="font-size:14px">'+it+'</div><div class="likert" data-li="'+l.id+'" data-j="'+j+'">'+
   LK.map(function(lb,v){return '<div class="lk'+(a[j]===v?' sel':'')+'" data-v="'+v+'"><b>'+(v+1)+'</b>'+lb+'</div>';}).join('')+'</div></div>';}).join('');
 }else if(S.step===1){const s=STATES[S.qi],a=S.stateAns[s.id]||[null,null];
  html='<div class="tag" style="margin-bottom:14px">Eixo 2 · Estados de consciência</div><h2>'+s.name+'</h2><div class="note" style="margin:4px 0 8px">'+s.desc+'</div><p class="body" style="margin-bottom:16px">'+s.sobre+'</p>'+
   s.items.map(function(t,j){return '<div class="card" style="margin-bottom:12px;padding:16px 18px"><div class="eyebrow" style="margin-bottom:8px">'+(j===0?'Frequência de acesso':'Estabilidade · platô ou pico')+'</div><div style="font-size:14px">'+t+'</div><div class="likert" data-st="'+s.id+'" data-j="'+j+'">'+
   LK.map(function(lb,v){return '<div class="lk'+(a[j]===v?' sel':'')+'" data-v="'+v+'"><b>'+(v+1)+'</b>'+lb+'</div>';}).join('')+'</div></div>';}).join('');
 }else{const q=STAGE_Q[S.qi],a=S.stageAns[S.qi];
  html='<div class="tag" style="margin-bottom:14px">Eixo 1 · '+q.type+'</div><h2 style="font-size:25px;line-height:1.25">'+q.q+'</h2><div style="margin-top:18px">'+
   q.opts.map(function(o,j){return '<button class="opt'+(a===j?' sel':'')+'" data-sq="'+j+'"><span class="dot"></span><span>'+o.t+'</span></button>';}).join('')+'</div>';
 }
 const done=(S.step===0&&(S.lineAns[LINES[S.qi].id]||[]).filter(function(x){return x!=null;}).length===3)
  ||(S.step===1&&(S.stateAns[STATES[S.qi].id]||[]).filter(function(x){return x!=null;}).length===2)
  ||(S.step===2&&S.stageAns[S.qi]!=null);
 const last=S.step===2&&S.qi===STAGE_Q.length-1;
 app().innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><div class="note" id="back" style="cursor:pointer">← voltar</div><div class="note">'+assessDone()+' / '+total+'</div></div>'+
 '<div class="prog"><i style="width:'+pct+'%"></i></div><div class="fade">'+html+'</div>'+
 '<div style="margin-top:22px;display:flex;justify-content:flex-end"><button class="btn" id="next"'+(done?'':' disabled')+'>'+(last?'Ver meu relatório completo':'Continuar')+'</button></div>';
 document.querySelectorAll('.likert').forEach(function(g){g.querySelectorAll('.lk').forEach(function(b){b.onclick=function(){

  if(g.dataset.li){const id=g.dataset.li;S.lineAns[id]=S.lineAns[id]||[null,null,null];S.lineAns[id][j]=v;}
  else{const id=g.dataset.st;S.stateAns[id]=S.stateAns[id]||[null,null];S.stateAns[id][j]=v;}
  renderAssess();};});});
 document.querySelectorAll('.opt[data-sq]').forEach(function(b){b.onclick=function(){S.stageAns[S.qi]=+b.dataset.sq;renderAssess();};});
 document.getElementById('back').onclick=function(){
  if(S.qi>0)S.qi--;else if(S.step>0){S.step--;S.qi=(S.step===0?LINES.length:STATES.length)-1;}else{go('intro');return;}renderAssess();};
 document.getElementById('next').onclick=function(){

  if(S.qi<max)S.qi++;else if(S.step<2){S.step++;S.qi=0;}else{S.result=compute();go('capture');return;}renderAssess();};
}

async function submitLead(){
 const nome=document.getElementById('f-nome').value.trim();
 const email=document.getElementById('f-email').value.trim();
 const whats=document.getElementById('f-whats').value.trim();
 if(!nome)return ferr('Digite seu nome.');
 if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))return ferr('Digite um e-mail válido.');
 if(whats.replace(/\D/g,'').length<10)return ferr('Digite um WhatsApp válido com DDD.');
 S.name=nome;S.lead={nome:nome,email:email,whatsapp:whats};
 const b=document.getElementById('reveal');b.disabled=true;b.textContent='Abrindo...';
 const r=S.result,st=STAGES[r.primary],ns=nextState();
 const payload={nome:nome,email:email,whatsapp:whats,
  centro_de_gravidade:st.name,altitude:st.alt,camada:st.camada,
  coeficiente:r.overall+'%',limiar_51:r.threshold+'%',
  linha_lider:r.leader.name,linha_atrasada:r.lagger.name,
  proximo_estagio:STAGES[r.emergent].name,proximo_estado:ns.name,
  alertas_pre_trans:(r.flags.map(function(f){return f.t;}).join(' | ')||'nenhum'),
  origem:'Assessment Completo · Kosmos',data:new Date().toISOString()};
 try{if(MAKE_WEBHOOK_URL.indexOf('COLE_AQUI')===-1)await fetch(MAKE_WEBHOOK_URL,{method:'POST',body:new URLSearchParams(payload)});}catch(e){}
 await store.set('kosmos_ac_result',{name:nome,result:r,date:Date.now()});
 go('dash');
}

function avatarSVG(){const r=S.result,pl=r.primary,ol=r.overall/100,seg=160/7;let s='';
 for(let i=0;i<7;i++){const y=170-(i+1)*seg;
  s+='<rect x="30" y="'+y+'" width="34" height="'+(seg-2.5)+'" rx="4" fill="'+C[i]+'" opacity="'+(0.14+(i<=pl?0.78:0.18)*(0.5+ol*0.5))+'"/>';}
 return '<svg width="100" height="195" viewBox="0 0 100 195"><circle cx="47" cy="17" r="13" fill="'+C[pl]+'" opacity="'+(0.35+ol*0.6)+'"/>'+s+
 '<text x="47" y="190" text-anchor="middle" font-size="9" fill="#7888b0" font-family="DM Mono">coef '+r.overall+'%</text></svg>';}
function radarSVG(){const r=S.result,cx=110,cy=108,R=82,N=LINES.length;
 const pt=function(i,rr){const a=-Math.PI/2+i*2*Math.PI/N;return[cx+Math.cos(a)*rr*R,cy+Math.sin(a)*rr*R];};
 let g='';for(let ring=1;ring<=3;ring++){const p=[];for(let i=0;i<N;i++)p.push(pt(i,ring/3).join(','));
  g+='<polygon points="'+p.join(' ')+'" fill="none" stroke="rgba(120,140,200,0.10)"/>';}
 for(let i=0;i<N;i++){const q=pt(i,1);g+='<line x1="'+cx+'" y1="'+cy+'" x2="'+q[0]+'" y2="'+q[1]+'" stroke="rgba(120,140,200,0.08)"/>';}
 const poly=LINES.map(function(l,i){return pt(i,Math.max(.05,r.lines[l.id].score/100)).join(',');}).join(' ');
 let d='',lb='';LINES.forEach(function(l,i){const p=pt(i,Math.max(.05,r.lines[l.id].score/100));
  d+='<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2.5" fill="'+C[r.lines[l.id].stage]+'"/>';
  const q=pt(i,1.2);lb+='<text x="'+q[0]+'" y="'+q[1]+'" text-anchor="middle" font-size="8.5" fill="#7888b0" font-family="DM Mono">'+l.name.split(' ')[0]+'</text>';});
 return '<svg width="220" height="216" viewBox="0 0 220 216"><defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6272f0"/><stop offset="1" stop-color="#d946ef"/></linearGradient></defs>'+g+
 '<polygon points="'+poly+'" fill="url(#rg)" fill-opacity="0.16" stroke="url(#rg)" stroke-width="1.8"/>'+d+lb+'</svg>';}

/* ════════ RECOMENDAÇÃO ════════ */
function recommend(){const r=S.result,ids=[];
 const add=function(id){if(ids.indexOf(id)===-1)ids.push(id);};
 const minN=r.primary<=1?1:r.primary<=3?1:2,maxN=r.primary<=1?2:3;
 const fits=function(p){return p.n>=minN&&p.n<=maxN;};
 PRACTICES.filter(function(p){return p.tag===r.lagger.id&&fits(p);}).slice(0,2).forEach(function(p){add(p.id);});
 r.flags.forEach(function(f){
  if(f.t.indexOf('Familiaridade')>-1){add('s3');add('r2');}
  if(f.t.indexOf('Topo')>-1||f.t.indexOf('ancorar')>-1){add('c3');add('c1');}
  if(f.t.indexOf('Estados acima')>-1){add('s4');add('m4');}
  if(f.t.indexOf('relação')>-1){add('r1');add('r2');}
  if(f.t.indexOf('Despertar sem')>-1){add('s5');add('k1');}});
 const map={denso:'c1',sutil:'e3',causal:'e5',test:'e4',nd:'e6'};
 const ns=nextState().id;if(map[ns])add(map[ns]);
 add(r.primary>=4?'k4':'k1');
 if(ids.length<5)PRACTICES.filter(fits).forEach(function(p){if(ids.length<6)add(p.id);});
 ids.forEach(function(i){S.selected.add(i);});
 return ids;}

   '<div style="font-weight:500;font-size:14px">'+p.title+' <span class="badge" style="background:rgba(120,140,200,.10);color:var(--muted2);margin-left:4px">'+NIV[p.n]+'</span>'+
   (rec?' <span class="badge" style="background:rgba(240,192,96,.15);color:var(--luz)">recomendada</span>':'')+'</div>'+
   '<div class="note" style="margin:3px 0 5px">'+p.dur+' · desenvolve '+labelFor(p.tag)+'</div>'+
   '<div style="font-size:12.5px;color:var(--muted2)">'+p.desc+'</div>'+
   '<div style="font-size:12px;color:var(--muted2);margin-top:6px"><b style="color:var(--text);font-weight:500">Como fazer:</b> '+p.como+'</div>'+
   '<div style="font-size:11px;color:'+m.c+';margin-top:6px;font-family:var(--ff-m)">↗ '+p.fut+'</div></div></div>';});});});
 w.innerHTML=h;
 w.querySelectorAll('.practice').forEach(function(el){el.onclick=function(){const id=el.dataset.p;
  if(S.selected.has(id))S.selected.delete(id);else S.selected.add(id);renderPractices(recIds);};});}

/* ════════ PDF ════════ */
async function savePDF(){
 const btn=document.getElementById('savePdf'),el=document.getElementById('app');
 if(!window.html2pdf){window.print();return;}
 const isMon=S.screen==='monitor';
 const nm=(S.name||'').replace(/[\\/:*?"<>|]/g,'').trim();
 const dateStr=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
 const sub=isMon?'Painel de Evolução':'Relatório da Terceira Camada';
 const fn='Kosmos - '+(isMon?'Painel de Evolução':'Assessment Completo')+(nm?' - '+nm:'')+'.pdf';
 const hdr=document.createElement('div');
 hdr.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;padding:0 2px 14px;border-bottom:1px solid rgba(120,140,200,.18);margin-bottom:20px">'+
 '<div style="display:flex;align-items:center;gap:11px"><div style="width:26px;height:26px;border-radius:50%;background:var(--grad)"></div>'+
 '<div style="text-align:left"><div class="serif" style="font-size:21px;letter-spacing:.03em;line-height:1">Kosmos</div>'+
 '<div style="font-family:var(--ff-m);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);margin-top:2px">'+sub+'</div></div></div>'+
 '<div style="text-align:right;font-family:var(--ff-m);font-size:9px;color:var(--muted2);line-height:1.6">'+(nm?nm+'<br>':'')+'Gerado em '+dateStr+'</div></div>';
 const old=btn?btn.textContent:'';if(btn){btn.disabled=true;btn.textContent='Gerando PDF...';}
 const hide=Array.prototype.slice.call(document.querySelectorAll('.no-print'));
 hide.forEach(function(e){e.style.display='none';});
 el.insertBefore(hdr,el.firstChild);
 const opt={margin:[8,8,10,8],filename:fn,image:{type:'jpeg',quality:0.97},
  html2canvas:{scale:2,backgroundColor:'#020407',useCORS:true,windowWidth:el.scrollWidth},
  jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy'],avoid:'.card'}};
 try{await window.html2pdf().set(opt).from(el).save();}
 catch(e){if(hdr.parentNode)hdr.remove();window.print();}
 finally{if(hdr.parentNode)hdr.remove();hide.forEach(function(e){e.style.display='';});if(btn){btn.disabled=false;btn.textContent=old;}}
}

/* ════════ MONITORAMENTO ════════ */
function weekKeys(){const out=[],now=new Date();
 for(let i=7;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i*7);
  const y=d.getFullYear(),j=new Date(y,0,1);const wk=Math.ceil((((d-j)/86400000)+j.getDay()+1)/7);
  out.push({key:y+'-W'+wk,label:'S'+wk});}return out;}
function trendSVG(sn){const W=300,H=140,pad=24;
 if(!sn.length)return '<svg width="'+W+'" height="'+H+'"><text x="'+(W/2)+'" y="'+(H/2)+'" text-anchor="middle" fill="#4a5878" font-size="11" font-family="DM Mono">sem fotografias ainda</text></svg>';
 const pts=sn.map(function(s,i){const x=pad+(sn.length===1?0.5:i/(sn.length-1))*(W-2*pad);const y=H-pad-(s.overall/100)*(H-2*pad);return[x,y,s];});
 let g='';for(let i=0;i<=4;i++){const y=pad+i/4*(H-2*pad);g+='<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad)+'" y2="'+y+'" stroke="rgba(120,140,200,0.08)"/>';}
 const path=pts.map(function(p,i){return (i?'L':'M')+p[0]+' '+p[1];}).join(' ');
 const dots=pts.map(function(p){return '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3.5" fill="'+C[p[2].primary]+'"/>';}).join('');
 return '<svg width="'+W+'" height="'+H+'"><defs><linearGradient id="tg" x1="0" x2="1"><stop offset="0" stop-color="#6272f0"/><stop offset="1" stop-color="#d946ef"/></linearGradient></defs>'+g+
 '<path d="'+path+'" fill="none" stroke="url(#tg)" stroke-width="2"/>'+dots+'</svg>';}
async function renderMonitor(){
 S.log=await store.get('kosmos_ac_log')||{};S.snaps=await store.get('kosmos_ac_snaps')||[];
 const r=S.result,sel=Array.from(S.selected),wks=weekKeys();
 const pr=sel.length?sel.map(function(id){const p=PRACTICES.filter(function(x){return x.id===id;})[0];if(!p)return '';
  const m=MODS.filter(function(x){return x.id===p.mod;})[0],log=S.log[id]||{};
  const streak=wks.filter(function(w){return log[w.key];}).length;
  return '<div class="card" style="margin-bottom:10px;padding:15px 17px"><div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px">'+
  '<div><span style="font-weight:500">'+p.title+'</span> <span class="theo" style="color:'+m.c+'">'+m.name.split(' ')[0]+'</span> <span class="theo">'+NIV[p.n]+'</span></div>'+
  '<span class="streak">'+streak+'/8 semanas</span></div><div class="note" style="margin-top:3px">'+p.dur+'</div>'+
  '<div class="week-grid">'+wks.map(function(w){return '<div class="wk'+(log[w.key]?' done':'')+'" data-p="'+id+'" data-w="'+w.key+'" style="'+(log[w.key]?'background:'+m.c:'')+'">'+w.label+'</div>';}).join('')+'</div></div>';}).join('')
  :'<p class="lead">Você ainda não selecionou práticas. Volte ao relatório para escolhê-las.</p>';
 app().innerHTML=navBar('monitor')+
 '<div class="eyebrow" style="margin-bottom:6px">Painel de evolução · '+new Date().toLocaleDateString('pt-BR',{month:'long',year:'numeric'})+'</div>'+
 '<h2 style="margin-bottom:6px">Acompanhe sua jornada ao longo dos meses</h2>'+
 '<p class="lead" style="margin-bottom:20px">Registre suas práticas a cada semana e tire uma fotografia mensal dos seus níveis. Com o tempo, o painel revela a curva real da sua evolução — não a percebida. Essa diferença entre curva real e percebida é, ela mesma, um instrumento anti-bypass.</p>'+
 '<div class="grid2"><div class="card"><div class="sec-h" style="margin-top:0"><h3>Níveis ao longo do tempo</h3></div>'+
 '<div style="text-align:center;margin:6px 0 10px">'+trendSVG(S.snaps)+'</div>'+
 '<div class="kv"><span class="k">Coeficiente atual</span><span>'+r.overall+'%</span></div>'+
 '<div class="kv"><span class="k">Estágio atual</span><span>'+STAGES[r.primary].name+'</span></div>'+
 '<div class="kv"><span class="k">Fotografias registradas</span><span>'+S.snaps.length+'</span></div>'+
 '<button class="snap-btn no-print" id="snap" style="margin-top:12px;width:100%">+ Registrar fotografia deste mês</button>'+
 '<p class="note" style="margin-top:8px">Uma fotografia por mês. Para releitura completa, refaça o assessment a cada três a seis meses — mudanças de estágio levam anos, mas as linhas se movem em meses.</p></div>'+
 '<div class="card"><div class="sec-h" style="margin-top:0"><h3>Psicógrafo de referência</h3></div><div class="viz2">'+radarSVG()+'</div>'+
 '<p class="body">Sua linha-prioridade segue sendo <b style="color:var(--luz);font-weight:500">'+r.lagger.name+'</b>. Observe se ela sobe nas próximas fotografias — é o indicador mais honesto de que o desenvolvimento está acontecendo, e não apenas se acumulando onde já era forte.</p></div></div>'+
 '<div class="card" style="margin-top:16px"><div class="sec-h" style="margin-top:0"><h3>Suas práticas · check-in semanal</h3></div>'+
 '<p class="note" style="margin-bottom:14px">Toque numa semana para marcar como cumprida. S = número da semana do ano.</p>'+pr+'</div>'+
 '<div class="card glow no-print" style="margin-top:16px;text-align:center"><h3 style="margin-bottom:6px">Exportar este painel</h3>'+
 '<p class="lead" style="margin:0 auto 14px">Salve um retrato do seu progresso deste mês em PDF para acompanhar a evolução ao longo do tempo.</p>'+
 '<button class="btn" id="savePdf" style="width:100%;max-width:340px">⤓  Salvar painel em PDF</button></div>'+
 '<p class="note" style="text-align:center;margin-top:18px">'+(PERSISTS?'Seu progresso é salvo automaticamente neste navegador.':'Modo de sessão: o progresso não será mantido ao fechar a aba neste ambiente.')+'</p>';
 bindNav();
 const spm=document.getElementById('savePdf');if(spm)spm.onclick=savePDF;
 document.querySelectorAll('.wk').forEach(function(w){w.onclick=async function(){const id=w.dataset.p,k=w.dataset.w;
  S.log[id]=S.log[id]||{};S.log[id][k]=!S.log[id][k];await store.set('kosmos_ac_log',S.log);renderMonitor();};});
 document.getElementById('snap').onclick=async function(){
  S.snaps.push({date:Date.now(),overall:r.overall,primary:r.primary});
  await store.set('kosmos_ac_snaps',S.snaps);renderMonitor();};
}

/* ════════ ROUTER ════════ */
function render(){const el=app();el.classList.remove('fade');void el.offsetWidth;el.classList.add('fade');
 if(S.screen==='intro')return renderIntro();
 if(S.screen==='assess')return renderAssess();
 if(S.screen==='capture')return renderCapture();
 if(S.screen==='dash')return renderDash();
 if(S.screen==='monitor')return renderMonitor();}
render();
</script>
