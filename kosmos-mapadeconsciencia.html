.wrap{max-width:1080px;margin:0 auto;padding:28px 18px 90px}
.fade{animation:fade .45s ease}

.serif{font-family:var(--ff-d)}
.mono{font-family:var(--ff-m)}

h3{font-family:var(--ff-d);font-weight:500;font-size:21px;line-height:1.2}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.lead{color:var(--muted2);font-size:15px;max-width:640px}
.card{background:linear-gradient(180deg,rgba(16,27,52,.55),rgba(8,14,28,.55));border:1px solid var(--border);border-radius:18px;padding:22px;backdrop-filter:blur(8px)}
.card.glow{border-color:var(--b2);box-shadow:0 0 0 1px rgba(98,114,240,.04),0 30px 80px -40px rgba(98,114,240,.4)}
.divider{height:1px;background:var(--border);margin:18px 0}
.btn{font-family:var(--ff-b);font-weight:500;font-size:14px;padding:14px 26px;border-radius:12px;border:none;cursor:pointer;color:#06080f;background:var(--grad2);transition:transform .15s,filter .15s;letter-spacing:.01em}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--b2)}
.btn.ghost:hover{border-color:var(--b3);background:rgba(120,140,200,.05)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;filter:none}
.tag{display:inline-block;font-family:var(--ff-m);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 11px;border-radius:99px;border:1px solid var(--b2);color:var(--muted2)}
.input{width:100%;background:rgba(8,14,28,.6);border:1px solid var(--b2);border-radius:12px;padding:13px 16px;color:var(--text);font-family:var(--ff-b);font-size:15px}
.input:focus{outline:none;border-color:var(--indigo)}
.prog{height:3px;background:rgba(120,140,200,.12);border-radius:2px;overflow:hidden;margin:18px 0 26px}
.prog>i{display:block;height:100%;background:var(--grad2);transition:width .4s}
.opt{width:100%;text-align:left;background:rgba(8,14,28,.5);border:1px solid var(--border);border-radius:13px;padding:14px 17px;color:var(--text);font-size:14px;cursor:pointer;margin-bottom:9px;transition:all .14s;display:flex;gap:13px;align-items:flex-start;font-weight:300}
.opt:hover{border-color:var(--b3);background:rgba(120,140,200,.06)}
.opt.sel{border-color:var(--indigo);background:rgba(98,114,240,.10)}
.dot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--muted);flex-shrink:0;margin-top:2px;transition:all .14s}
.opt.sel .dot{border-color:var(--indigo);border-width:5px}
.likert{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.lk{flex:1;min-width:64px;text-align:center;background:rgba(8,14,28,.5);border:1px solid var(--border);border-radius:11px;padding:11px 6px;cursor:pointer;font-size:11px;color:var(--muted2);transition:all .14s;line-height:1.3}

.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

.tabs{display:flex;gap:6px}

.tab.on{border-color:var(--b3);color:var(--text);background:rgba(120,140,200,.07)}
.sec-h{display:flex;align-items:center;gap:11px;margin:30px 0 14px}
.sec-h .n{font-family:var(--ff-m);font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:3px 8px}

.viz2{display:flex;gap:22px;align-items:center;justify-content:center;flex-wrap:wrap}
</style>

const MEM={};
function hasLS(){try{const x='__k';localStorage.setItem(x,'1');localStorage.removeItem(x);return true;}catch(e){return false;}}
const store={
 async get(k){
   try{if(window.storage){const r=await window.storage.get(k);return r?JSON.parse(r.value):null;}}catch(e){}
   try{if(hasLS()){const v=localStorage.getItem(k);if(v!=null)return JSON.parse(v);}}catch(e){}
   return (k in MEM)?MEM[k]:null;
 },
 async set(k,v){
   MEM[k]=v;
   try{if(window.storage){await window.storage.set(k,JSON.stringify(v));return;}}catch(e){}
   try{if(hasLS()){localStorage.setItem(k,JSON.stringify(v));}}catch(e){}
 }
};
const PERSISTS=(typeof window!=='undefined')&&(!!window.storage||hasLS());

/* ════════════════════════ SCORING ════════════════════════ */
function lineScore(id){const a=S.lineAns[id]||[0,0,0];const raw=a[0]*0.33+a[1]*0.66+a[2]*1.0;return Math.min(100,Math.round(raw/7.96*100));}
function lineStage(sc){return sc<18?0:sc<38?1:sc<60?2:sc<78?3:sc<90?4:sc<97?5:6;}
function stateScore(id){const a=S.stateAns[id]||[0,0];return {access:Math.round(a[0]/4*100),plateau:a[1]>=a[0]&&a[0]>=2,raw:a};}
function compute(){
 const lines={}; LINES.forEach(l=>{const sc=lineScore(l.id);lines[l.id]={score:sc,stage:lineStage(sc)};});
 const states={}; STATES.forEach(s=>states[s.id]=stateScore(s.id));
 // estágio: votos de cenário/perspectiva + linhas-âncora (cog,self,val)
 const votes=new Array(7).fill(0);
 S.stageAns.forEach((opt,i)=>{if(opt!=null){votes[STAGE_Q[i].opts[opt].s]+=2;}});
 ['cog','self','val'].forEach(id=>{votes[lines[id].stage]+=1;});
 // centro de gravidade = média ponderada arredondada; emergente = pico acima; anterior = abaixo
 let total=votes.reduce((a,b)=>a+b,0)||1;
 let cog_g=0; votes.forEach((v,i)=>cog_g+=v*i); cog_g=cog_g/total;
 const primary=Math.max(0,Math.min(6,Math.round(cog_g)));
 const emergent=Math.min(6,primary+1);
 const anterior=Math.max(0,primary-1);
 // coef geral
 const overall=Math.round((LINES.reduce((a,l)=>a+lines[l.id].score,0)/LINES.length));
 // estados elevados médios (sutil/causal/nd)
 const highStates=(states.sutil.access+states.causal.access+states.nd.access)/3;
 // flags pré-trans
 const flags=[];
 if(highStates>55 && primary<3) flags.push({t:'Estados acima do estágio',c:'var(--warn)',d:'Você acessa estados elevados (sutil/causal/não-dual) que ainda são interpretados por um estágio estrutural mais convencional. É a assinatura clássica da falácia pré-trans: a experiência é real, mas a moldura que a lê ainda não é transpessoal. Risco de inflação ou de literalizar o vislumbre.'});
 const others=(lines.self.score+lines.val.score+lines.mor.score+lines.rel.score+lines.som.score)/5;
 if(lines.cog.score-others>22) flags.push({t:'Familiaridade vs. descrição',c:'var(--alert)',d:'Sua linha cognitiva está bem acima das demais. Sinal de que você domina o vocabulário da terceira camada mais do que o encarna. A armadilha do líder integral: falar o mapa e confundir isso com habitar o território. O crescimento aqui é descer o conhecimento para o corpo, a sombra e a relação.'});
 if(lines.som.score < others-18) flags.push({t:'Topo pesado, base leve',c:'var(--warn)',d:'Sua linha somática está atrás das demais. Altitude sem encarnação é instável: estados elevados sem base corporal tendem a oscilar e a gerar desencarnação. A linha somática é a prioridade — não a sua linha mais forte.'});
 if(highStates>60 && states.denso.access<55) flags.push({t:'Subir sem ancorar',c:'var(--warn)',d:'Forte acesso a estados expandidos com presença encarnada (Denso) mais baixa. Lembre-se: Supermente é o limite vertical, mas a encarnação é o que torna a realização útil ao mundo. Ancorar é parte do caminho, não um passo anterior a ele.'});
 // limiar dos 51%
 const higherVotes=votes.slice(4).reduce((a,b)=>a+b,0);
 const threshold=Math.round(higherVotes/total*100);
 // linha líder / atrasada
 const arr=LINES.map(l=>({id:l.id,name:l.name,score:lines[l.id].score})).sort((a,b)=>b.score-a.score);
 return {lines,states,primary,emergent,anterior,overall,flags,threshold,leader:arr[0],lagger:arr[arr.length-1],highStates:Math.round(highStates)};
}

     else{const id=grp.dataset.st;S.stateAns[id]=S.stateAns[id]||[null,null];S.stateAns[id][j]=v;}
     renderAssess();
   });
 });
 document.querySelectorAll('.opt[data-sq]').forEach(b=>b.onclick=()=>{S.stageAns[S.qi]=+b.dataset.sq;renderAssess();});
 document.getElementById('back').onclick=()=>{
   if(S.qi>0){S.qi--;} else if(S.step>0){S.step--;S.qi=(S.step===0?LINES.length:STATES.length)-1;} else {go('intro');return;}

 };
 document.getElementById('next').onclick=()=>{

 };
}

function avatarSVG(){
 const r=S.result, pl=r.primary, ol=r.overall/100, seg=160/7;
 let segs='';
 for(let i=0;i<7;i++){const lit=Math.min(1,(LINES.reduce((a,l)=>a+(r.lines[l.id].stage>=i?r.lines[l.id].score/100:0),0)/LINES.length));
   const y=170-(i+1)*seg; segs+=`<rect x="30" y="${y}" width="34" height="${seg-2.5}" rx="4" fill="${C[i]}" opacity="${0.14+ (i<=pl?0.78:0.20)*(0.5+ol*0.5)}"/>`;}
 return `<svg width="100" height="195" viewBox="0 0 100 195"><circle cx="47" cy="17" r="13" fill="${C[pl]}" opacity="${0.35+ol*0.6}"/>${segs}<text x="47" y="190" text-anchor="middle" font-size="9" fill="#7888b0" font-family="DM Mono">coef ${r.overall}%</text></svg>`;
}
function radarSVG(){
 const r=S.result,cx=110,cy=108,R=82,N=LINES.length;
 const pt=(i,rr)=>{const a=-Math.PI/2+i*2*Math.PI/N;return[cx+Math.cos(a)*rr*R,cy+Math.sin(a)*rr*R];};
 let g='';for(let ring=1;ring<=3;ring++){let p=[];for(let i=0;i<N;i++)p.push(pt(i,ring/3).join(','));g+=`<polygon points="${p.join(' ')}" fill="none" stroke="rgba(120,140,200,0.10)" stroke-width="1"/>`;}
 for(let i=0;i<N;i++){const[x,y]=pt(i,1);g+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(120,140,200,0.08)"/>`;}
 const poly=LINES.map((l,i)=>pt(i,Math.max(.05,r.lines[l.id].score/100)).join(',')).join(' ');
 let labs='';LINES.forEach((l,i)=>{const[x,y]=pt(i,1.2);labs+=`<text x="${x}" y="${y}" text-anchor="middle" font-size="8.5" fill="#7888b0" font-family="DM Mono">${l.name.split(' ')[0]}</text>`;});
 let dots='';LINES.forEach((l,i)=>{const[x,y]=pt(i,Math.max(.05,r.lines[l.id].score/100));dots+=`<circle cx="${x}" cy="${y}" r="2.5" fill="${C[r.lines[l.id].stage]}"/>`;});
 return `<svg width="220" height="216" viewBox="0 0 220 216"><defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6272f0"/><stop offset="1" stop-color="#d946ef"/></linearGradient></defs>${g}<polygon points="${poly}" fill="url(#rg)" fill-opacity="0.16" stroke="url(#rg)" stroke-width="1.8"/>${dots}${labs}</svg>`;
}

function snapsTrendSVG(snaps){

 let dots=pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="${C[p[2].primary]}"/>`).join('');
 let grid='';for(let g=0;g<=4;g++){const y=pad+g/4*(H-2*pad);grid+=`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="rgba(120,140,200,0.08)"/>`;}
 return `<svg width="${W}" height="${H}"><defs><linearGradient id="tg" x1="0" x2="1"><stop offset="0" stop-color="#6272f0"/><stop offset="1" stop-color="#d946ef"/></linearGradient></defs>${grid}<path d="${path}" fill="none" stroke="url(#tg)" stroke-width="2"/>${dots}<text x="${pad}" y="${H-6}" fill="#4a5878" font-size="9" font-family="DM Mono">${new Date(snaps[0].date).toLocaleDateString('pt-BR',{month:'short'})}</text><text x="${W-pad}" y="${H-6}" text-anchor="end" fill="#4a5878" font-size="9" font-family="DM Mono">${new Date(snaps[snaps.length-1].date).toLocaleDateString('pt-BR',{month:'short'})}</text></svg>`;
}

/* ════════════════════════ ROUTER ════════════════════════ */
function render(){
 const el=app();el.classList.remove('fade');void el.offsetWidth;el.classList.add('fade');
 if(S.screen==='intro')return renderIntro();
 if(S.screen==='assess')return renderAssess();
 if(S.screen==='dash'){renderDash();bindNav();return;}
 if(S.screen==='monitor')return renderMonitor();
}
render();
</script>
</body>
